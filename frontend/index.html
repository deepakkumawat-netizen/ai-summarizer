/* Theme */
const useTheme = () => {
  const [theme, setTheme] = useState(() => {
    const s = localStorage.getItem('ais-theme');
    return s || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  });
  useLayoutEffect(() => {
    document.documentElement.classList.toggle('dark-mode', theme==='dark');
    localStorage.setItem('ais-theme', theme);
  }, [theme]);
  const toggleTheme = () => {
    document.documentElement.classList.add('no-transitions');
    requestAnimationFrame(()=>document.documentElement.classList.remove('no-transitions'));
    setTheme(t=>t==='light'?'dark':'light');
  };
  return {theme, toggleTheme};
};

/* History */
const useHistory = () => {
  const [history, setHistory] = useState(() => {
    try { return JSON.parse(localStorage.getItem('ais-history')||'[]'); } catch{ return []; }
  });
  const addToHistory = useCallback((item) => {
    setHistory(prev => {
      const updated = [{...item, id: Date.now(), date: new Date().toLocaleDateString()}, ...prev].slice(0,20);
      localStorage.setItem('ais-history', JSON.stringify(updated));
      return updated;
    });
  }, []);
  const clearHistory = useCallback(() => {
    setHistory([]); localStorage.removeItem('ais-history');
  }, []);
  const deleteItem = useCallback((id) => {
    setHistory(prev => {
      const updated = prev.filter(h=>h.id!==id);
      localStorage.setItem('ais-history', JSON.stringify(updated));
      return updated;
    });
  }, []);
  return {history, addToHistory, clearHistory, deleteItem};
};

  const wordCount = text.trim() ? text.trim().split(/\s+/).length : 0;
  const charCount = text.length;

  const showToast = useCallback((msg) => {
    clearTimeout(tTimer.current);
    setToast({msg, show:true});
    tTimer.current = setTimeout(()=>setToast(t=>({...t,show:false})), 2700);
  }, []);

  const handlePaste = async () => {
    try { const t=await navigator.clipboard.readText(); setText(t.slice(0,15000)); showToast("Pasted!"); }
    catch { showToast("Allow clipboard access"); }
  };

  const handleTextFile = e => {
    const f=e.target.files[0]; if(!f) return;
    const ext=f.name.split(".").pop().toLowerCase();
    if(!["txt","md","csv","html","xml","json","rtf","log"].includes(ext)){showToast("Unsupported file type");return;}
    const r=new FileReader();
    r.onload=ev=>{ setText(ev.target.result.slice(0,15000)); showToast(`Loaded: ${f.name}`); };
    r.readAsText(f); e.target.value="";
  };

  const handlePdfUpload = async e => {
    const f=e.target.files[0]; if(!f) return;
    if(!f.name.toLowerCase().endsWith(".pdf")){showToast("Please select a PDF file");return;}
    setExtracting(true); setPdfName(f.name); setText("");
    const form=new FormData(); form.append("file", f);
    try {
      const res = await fetch(`${API}/api/extract-pdf`, {method:"POST", body:form});
      const data = await res.json();
      if(!res.ok) throw new Error(data.detail||"PDF extraction failed");
      setText(data.text); showToast(`Extracted from ${f.name}`);
    } catch(e){ showToast(e.message); setPdfName(""); }
    finally { setExtracting(false); e.target.value=""; }
  };

  const handleUrlExtract = async () => {
    if(!urlInput.trim()){showToast("Enter a URL first");return;}
    setExtracting(true); setText("");
    try {
      const res = await fetch(`${API}/api/extract-url`, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({url: urlInput.trim()})
      });
      const data = await res.json();
      if(!res.ok) throw new Error(data.detail||"URL extraction failed");
      setText(data.text); showToast(`Extracted: ${data.title||urlInput}`);
    } catch(e){ showToast(e.message); }
    finally { setExtracting(false); }
  };

  const handleClear = () => { setText(""); setSummary(""); setStatus("idle"); setPdfName(""); setUrlInput(""); showToast("Cleared"); };

  const handleCopy = async () => {
    try { await navigator.clipboard.writeText(summary); showToast("Copied!"); }
    catch { showToast("Could not copy"); }
  };

  const handlePDF = () => {
    if(!summary) return;
    try {
      const {jsPDF}=window.jspdf;
      const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
      const m=20,pw=doc.internal.pageSize.getWidth(),ph=doc.internal.pageSize.getHeight(),mw=pw-m*2;
      doc.setFont("helvetica","bold"); doc.setFontSize(17); doc.setTextColor(10,22,40);
      doc.text("Text Summary",m,m+6);
      doc.setFont("helvetica","normal"); doc.setFontSize(8.5); doc.setTextColor(143,163,187);
      doc.text(`Text Summarizer  •  ${length.replace(/_/g," ")}  •  ${GRADE_LABELS[grade]||grade}  •  ${language}  •  ${new Date().toLocaleDateString()}`,m,m+14);
      doc.setDrawColor(219,234,254); doc.setLineWidth(.4); doc.line(m,m+18,pw-m,m+18);
      doc.setFont("helvetica","normal"); doc.setFontSize(11); doc.setTextColor(10,22,40);
      const lines=doc.splitTextToSize(summary,mw); let y=m+26;
      lines.forEach(l=>{ if(y>ph-m){doc.addPage();y=m;} doc.text(l,m,y); y+=7; });
      doc.setFontSize(8); doc.setTextColor(143,163,187);
      doc.text("Text Summarizer — Powered by Groq",m,ph-10);
      doc.save("summary.pdf"); showToast("PDF downloaded!");
    } catch{ showToast("PDF generation failed"); }
  };

  const handleSummarize = async () => {
    const t=text.trim();
    if(!t){showToast("Please enter some text first");taRef.current?.focus();return;}
    if(t.length>15000){showToast("Text exceeds 15,000 characters");return;}
    setStatus("loading"); setIWords(wordCount);
    try {
      const res=await fetch(`${API}/api/summarize`,{
        method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({text:t, length, grade_level:grade, language,
          length_instruction:LENGTH_MAP[length], grade_instruction:GRADE_INSTR[grade]}),
      });
      const data=await res.json();
      if(!res.ok) throw new Error(data.detail||"Something went wrong");
      let fmt=data.summary;
      if(length==="bullets"){
        fmt=data.summary.split("\n").filter(l=>l.trim()).map(l=>`• ${l.replace(/^[-•*]\s*/,"")}`).join("\n");
      }
      setSummary(fmt); setOWords(data.output_words); setStatus("result");
      addToHistory({
        summary: fmt,
        inputPreview: t.slice(0,80)+"…",
        length, grade, language,
        words: data.output_words
      });
    } catch(e){
      if(e.message && e.message.startsWith("INAPPROPRIATE_CONTENT:")){
        setStatus("idle");
        setDisclaimer(true);
        setDisclaimerSecs(5);
        clearTimeout(dTimer.current);
        clearInterval(dCount.current);
        dCount.current = setInterval(()=>setDisclaimerSecs(s=>{ if(s<=1){ clearInterval(dCount.current); return 0; } return s-1; }),1000);
        dTimer.current = setTimeout(()=>{ setDisclaimer(false); clearInterval(dCount.current); },5000);
      } else {
        setErrMsg(e.message); setStatus("error");
      }
    }
  };

  const loadFromHistory = (item) => {
    setSummary(item.summary); setStatus("result");
    setLength(item.length); setGrade(item.grade); setLanguage(item.language||"English");
    setOWords(item.words||0); setShowHistory(false); showToast("Loaded from history");
  };

  if(!entered) return <Landing onEnter={()=>setEntered(true)} theme={theme} toggleTheme={toggleTheme}/>;

  return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>

    {/* Inappropriate Content Disclaimer */}
    {disclaimer && (
      <div style={{position:"fixed",inset:0,zIndex:9999,display:"flex",alignItems:"center",
        justifyContent:"center",background:"rgba(0,0,0,0.55)",animation:"fadeUp .2s ease"}}>
        <div style={{background:"var(--card)",borderRadius:20,padding:"36px 40px",maxWidth:460,width:"90%",
          textAlign:"center",boxShadow:"0 24px 80px rgba(0,0,0,0.3)",
          border:"2px solid #ef4444",animation:"fadeUp .25s ease"}}>
          <div style={{fontSize:52,marginBottom:12}}>🚫</div>
          <div style={{fontSize:20,fontWeight:800,color:"#dc2626",marginBottom:10,letterSpacing:-.3}}>
            Inappropriate Content Detected
          </div>
          <div style={{fontSize:14,color:"var(--text-2)",lineHeight:1.7,marginBottom:20}}>
            This tool is designed for <strong>educational use only</strong>.<br/>
            Please summarize appropriate study materials such as textbooks, articles, research papers, or academic content.<br/><br/>
            <span style={{color:"#dc2626",fontWeight:700}}>Pornographic, violent, hateful, or illegal content is not allowed.</span>
          </div>
          <div style={{fontSize:12,color:"var(--text-3)",marginBottom:16}}>
            This message will close in <strong style={{color:"#dc2626"}}>{disclaimerSecs}s</strong>
          </div>
          <button onClick={()=>{setDisclaimer(false);clearTimeout(dTimer.current);clearInterval(dCount.current);}}
            style={{background:"#dc2626",color:"white",border:"none",borderRadius:10,padding:"10px 28px",
              fontWeight:700,fontSize:14,cursor:"pointer",transition:"background .2s"}}
            onMouseEnter={e=>e.target.style.background="#b91c1c"}
            onMouseLeave={e=>e.target.style.background="#dc2626"}>
            Dismiss
          </button>
        </div>
      </div>
    )}

    {/* Header */}
    <header style={{background:"var(--card)",backdropFilter:"blur(20px)",
      borderBottom:"1.5px solid var(--border)",flexShrink:0,zIndex:100,position:"sticky",top:0}}>
      <div style={{maxWidth:1300,margin:"0 auto",padding:"0 24px",height:64,
        display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:38,height:38,background:"linear-gradient(135deg,var(--blue),var(--blue-dark))",
            borderRadius:11,display:"flex",alignItems:"center",justifyContent:"center",
            boxShadow:"0 4px 14px rgba(57,154,255,.4)"}}>
            <IcoDoc/>
          </div>
          <span style={{fontSize:16,fontWeight:800,color:"var(--text-1)",letterSpacing:-.3}}>Text Summarizer</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{display:"flex",alignItems:"center",gap:6,background:"var(--blue-soft)",
            border:"1.5px solid var(--blue-mid)",borderRadius:999,padding:"5px 14px",
            fontSize:11,fontWeight:700,color:"var(--blue)",letterSpacing:.6,textTransform:"uppercase"}}>
            ✦ Powered by Groq
          </div>
          <button onClick={()=>setShowHistory(h=>!h)}
            style={{display:"flex",alignItems:"center",gap:6,background:showHistory?"var(--blue)":"var(--blue-soft)",
              border:`1.5px solid ${showHistory?"var(--blue)":"var(--blue-mid)"}`,
              borderRadius:999,padding:"5px 14px",fontSize:11,fontWeight:700,
              color:showHistory?"white":"var(--blue)",cursor:"pointer",transition:"all .2s",letterSpacing:.6,textTransform:"uppercase"}}>
            <IcoHistory/> History {history.length>0&&`(${history.length})`}
          </button>
          <button onClick={toggleTheme}
            style={{display:"flex",alignItems:"center",gap:6,background:"var(--blue-soft)",
              border:"1.5px solid var(--blue-mid)",borderRadius:999,padding:"5px 14px",
              fontSize:11,fontWeight:700,color:"var(--blue)",cursor:"pointer",transition:"all .2s",letterSpacing:.6,textTransform:"uppercase"}}>
            {theme==='dark'?'☀️ Light':'🌙 Dark'}
          </button>
        </div>
      </div>
    </header>

    <main style={{flex:1}}>
    <div style={{maxWidth:1300,margin:"0 auto",padding:"16px 20px 40px",width:"100%"}}>

      {/* Options bar */}
      <div className="options-bar" style={{background:"var(--card)",border:"1.5px solid var(--border)",borderRadius:16,
        padding:"16px 22px",display:"flex",gap:16,alignItems:"flex-end",flexWrap:"wrap",
        marginBottom:14,boxShadow:"var(--shadow)",animation:"fadeUp .6s .1s ease both"}}>

        <Select label="Summary Length" value={length} onChange={setLength} minW={200}>
          <optgroup label="Paragraphs">
            {["1_paragraph","2_paragraphs","3_paragraphs","4_paragraphs","5_paragraphs"].map(v=>
              <option key={v} value={v}>{v.replace("_"," ").replace(/\b\w/g,c=>c.toUpperCase())}</option>)}
          </optgroup>
          <optgroup label="Other Formats">
            <option value="bullets">Bullet Points</option>
            <option value="notes">Notes Format</option>
          </optgroup>
        </Select>

        <Select label="Reading Level" value={grade} onChange={setGrade} minW={175}>
          {Object.entries(GRADE_LABELS).map(([v,l])=><option key={v} value={v}>{l}</option>)}
        </Select>

        <Select label="Output Language" value={language} onChange={setLanguage} minW={165}>
          {LANGUAGES.map(l=><option key={l} value={l}>{l}</option>)}
        </Select>

        <div style={{marginLeft:"auto",display:"flex",flexDirection:"column",alignItems:"flex-end",gap:2}}>
          <span style={{fontSize:11,fontWeight:700,letterSpacing:1,color:"var(--text-3)",textTransform:"uppercase"}}>Input</span>
          <span style={{fontSize:13,fontWeight:600,color:charCount>14000?"#ef4444":"var(--text-2)"}}>
            {charCount.toLocaleString()} / 15,000 chars &nbsp;·&nbsp; {wordCount.toLocaleString()} words
          </span>
        </div>
      </div>

      {/* Main layout: editor + optional history panel */}
      <div className="main-layout" style={{display:"flex",gap:14,animation:"fadeUp .6s .2s ease both"}}>

        {/* Editor grid */}
        <div style={{flex:1,background:"var(--card)",border:"1.5px solid var(--border)",borderRadius:20,
          boxShadow:"var(--shadow-lg)",overflow:"hidden"}}>
          <div className="editor-grid" style={{display:"grid",gridTemplateColumns:"1fr 60px 1fr",minHeight:580}}>

            {/* Left panel */}
            <div style={{display:"flex",flexDirection:"column",padding:"20px 22px"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,flexWrap:"wrap",gap:8}}>
                <InputTabs active={inputMode} onChange={m=>{setInputMode(m);setText("");setPdfName("");setUrlInput("");}}/>
                <div style={{display:"flex",gap:6}}>
                  {inputMode==="text" && <>
                    <SmallBtn onClick={handlePaste}><IcoPaste/> Paste</SmallBtn>
                    <SmallBtn onClick={()=>fileRef.current.click()}>📂 File</SmallBtn>
                    <input ref={fileRef} type="file" accept=".txt,.md,.csv,.html,.xml,.json,.rtf,.log" style={{display:"none"}} onChange={handleTextFile}/>
                  </>}
                  <SmallBtn onClick={handleClear} red><IcoClear/> Clear</SmallBtn>
                </div>
              </div>

              {/* Text input */}
              {inputMode==="text" &&
                <textarea ref={taRef} value={text}
                  onChange={e=>{ if(e.target.value.length<=15000) setText(e.target.value); }}
                  onKeyDown={e=>{ if((e.ctrlKey||e.metaKey)&&e.key==="Enter") handleSummarize(); }}
                  placeholder="Paste or type your text here… (Ctrl+Enter to summarize)"
                  style={{flex:1,width:"100%",resize:"none",border:"1.5px solid var(--border)",
                    borderRadius:12,padding:"16px 18px",fontFamily:"var(--font)",
                    fontSize:13.5,color:"var(--text-1)",lineHeight:1.8,
                    background:"#fafcff",outline:"none",minHeight:460,transition:"border-color .2s,box-shadow .2s"}}
                  onFocus={e=>{e.target.style.borderColor="var(--blue)";e.target.style.boxShadow="0 0 0 4px rgba(57,154,255,.1)";}}
                  onBlur={e=>{e.target.style.borderColor="var(--border)";e.target.style.boxShadow="none";}}
                />}

              {/* PDF input */}
              {inputMode==="pdf" &&
                <div style={{flex:1,display:"flex",flexDirection:"column",gap:12}}>
                  <div onClick={()=>pdfRef.current.click()}
                    style={{border:`2px dashed ${pdfName?"var(--blue)":"var(--border)"}`,borderRadius:14,
                      padding:"32px 20px",textAlign:"center",cursor:"pointer",transition:"all .2s",
                      background:pdfName?"var(--blue-soft)":"var(--bg)"}}>
                    <div style={{fontSize:40,marginBottom:8}}>📄</div>
                    <p style={{fontWeight:700,color:"var(--text-1)",marginBottom:4}}>
                      {pdfName || "Click to upload PDF"}
                    </p>
                    <p style={{fontSize:12,color:"var(--text-3)"}}>
                      {extracting?"Extracting text…":"Supports PDF files up to 30 pages"}
                    </p>
                    {extracting && <div style={{marginTop:12,display:"flex",justifyContent:"center"}}><Dots/></div>}
                  </div>
                  <input ref={pdfRef} type="file" accept=".pdf" style={{display:"none"}} onChange={handlePdfUpload}/>
                  {text && <textarea value={text} onChange={e=>setText(e.target.value)}
                    style={{flex:1,resize:"none",border:"1.5px solid var(--border)",borderRadius:12,
                      padding:"14px 16px",fontFamily:"var(--font)",fontSize:12.5,color:"var(--text-1)",
                      lineHeight:1.7,background:"#fafcff",outline:"none",minHeight:300}}/>}
                </div>}

              {/* URL input */}
              {inputMode==="url" &&
                <div style={{flex:1,display:"flex",flexDirection:"column",gap:12}}>
                  <div style={{display:"flex",gap:8}}>
                    <input value={urlInput} onChange={e=>setUrlInput(e.target.value)}
                      onKeyDown={e=>e.key==="Enter"&&handleUrlExtract()}
                      placeholder="https://example.com/article"
                      style={{flex:1,padding:"12px 16px",border:"1.5px solid var(--border)",borderRadius:10,
                        fontFamily:"var(--font)",fontSize:13.5,color:"var(--text-1)",
                        background:"var(--white)",outline:"none",transition:"border-color .2s"}}
                      onFocus={e=>e.target.style.borderColor="var(--blue)"}
                      onBlur={e=>e.target.style.borderColor="var(--border)"}/>
                    <button onClick={handleUrlExtract} disabled={extracting}
                      style={{padding:"12px 20px",background:"var(--blue)",color:"white",border:"none",
                        borderRadius:10,fontFamily:"var(--font)",fontWeight:700,fontSize:13,cursor:"pointer"}}>
                      {extracting?"…":"Extract"}
                    </button>
                  </div>
                  {extracting && <div style={{display:"flex",justifyContent:"center",padding:20}}><Dots/></div>}
                  {text && <textarea value={text} onChange={e=>setText(e.target.value)}
                    style={{flex:1,resize:"none",border:"1.5px solid var(--border)",borderRadius:12,
                      padding:"14px 16px",fontFamily:"var(--font)",fontSize:12.5,color:"var(--text-1)",
                      lineHeight:1.7,background:"#fafcff",outline:"none",minHeight:360}}/>}
                </div>}
            </div>

            {/* Center button */}
            <div className="center-btn" style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
              borderLeft:"1.5px solid var(--border)",borderRight:"1.5px solid var(--border)",
              background:theme==="dark"?"linear-gradient(180deg,#1a2332,#253549)":"linear-gradient(180deg,var(--blue-soft),#f0f6ff)"}}>
              <button onClick={handleSummarize} disabled={status==="loading"}
                style={{display:"flex",flexDirection:"column",alignItems:"center",gap:10,
                  background:status==="loading"?"linear-gradient(135deg,#93c5fd,#60a5fa)":"linear-gradient(135deg,var(--blue),var(--blue-dark))",
                  color:"white",border:"none",borderRadius:16,padding:"16px 13px",
                  cursor:status==="loading"?"not-allowed":"pointer",
                  boxShadow:status==="loading"?"none":"0 6px 24px rgba(57,154,255,.45)",
                  transition:"all .25s cubic-bezier(.34,1.56,.64,1)",
                  animation:status!=="loading"?"pulseRing 2.5s ease infinite":"none",fontFamily:"var(--font)"}}>
                {status==="loading"
                  ? <div style={{width:18,height:18,borderRadius:"50%",border:"2.5px solid rgba(255,255,255,.4)",borderTopColor:"white",animation:"spin .7s linear infinite"}}/>
                  : <svg width={18} height={18} viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg>}
                <span style={{fontSize:9.5,fontWeight:800,letterSpacing:1.4,textTransform:"uppercase",writingMode:"vertical-lr",transform:"rotate(180deg)"}}>
                  {status==="loading"?"Working":"Summarize"}
                </span>
              </button>
            </div>

            {/* Right panel — summary output */}
            <div style={{display:"flex",flexDirection:"column",padding:"20px 22px"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                <span style={{fontSize:11,fontWeight:700,letterSpacing:1,color:"var(--text-3)",textTransform:"uppercase"}}>AI Summary</span>
                {status==="result" &&
                  <div style={{display:"flex",gap:6,animation:"slideIn .3s ease"}}>
                    <SmallBtn onClick={handleCopy}><IcoCopy/> Copy</SmallBtn>
                    <SmallBtn onClick={handlePDF} green><IcoDown/> PDF</SmallBtn>
                  </div>}
              </div>

              {status==="idle" &&
                <div style={{flex:1,border:`1.5px dashed ${theme==="dark"?"#0f766e":"var(--blue-mid)"}`,borderRadius:12,
                  display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
                  gap:12,background:theme==="dark"?"linear-gradient(135deg,#1a2332,#253549)":"linear-gradient(135deg,#f8fbff,#eef5ff)",
                  minHeight:460,padding:24,textAlign:"center"}}>
                  <div style={{fontSize:48,marginBottom:4}}>✨</div>
                  <p style={{fontSize:14,fontWeight:600,color:"var(--text-1)"}}>Your summary will appear here</p>
                  <p style={{fontSize:12.5,color:"var(--text-2)",lineHeight:1.6}}>
                    {inputMode==="text"&&"Paste text on the left and click Summarize"}
                    {inputMode==="pdf"&&"Upload a PDF, then click Summarize"}
                    {inputMode==="url"&&"Enter a URL, extract content, then click Summarize"}
                  </p>
                </div>}

              {status==="loading" &&
                <div style={{flex:1,border:"1.5px solid var(--border)",borderRadius:12,
                  display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
                  gap:16,minHeight:460,background:theme==="dark"?"linear-gradient(135deg,#1a2332,#253549)":"linear-gradient(135deg,#f8fbff,#eef5ff)"}}>
                  <Dots/>
                  <p style={{fontSize:13,color:"var(--text-3)",fontWeight:500}}>Generating summary{language!=="English"?` in ${language}`:""}…</p>
                </div>}

              {status==="result" && <>
                <div style={{flex:1,border:"1.5px solid var(--border)",borderRadius:12,
                  padding:"18px 20px",fontSize:13.5,color:"var(--text-1)",lineHeight:1.82,
                  background:theme==="dark"?"#1a2332":"#fafcff",overflowY:"auto",
                  maxHeight:520,minHeight:460,animation:"fadeUp .4s ease"}}>
                  {summary.split("\n").map((line,i)=>{
                    const isHeading=/^[A-Z][^a-z\n]{0,2}[\w\s,&\-()]{0,60}:/.test(line.trim())||/^\d+\.\s+[A-Z]/.test(line.trim());
                    const isBullet=/^[•\-*]\s/.test(line.trim());
                    if(!line.trim()) return <div key={i} style={{height:8}}/>;
                    if(isHeading) return <div key={i} style={{fontWeight:800,fontSize:14,color:"var(--blue-dark)",marginTop:i===0?0:14,marginBottom:3}}>{line}</div>;
                    if(isBullet)  return <div key={i} style={{paddingLeft:14,marginBottom:3}}>{line}</div>;
                    return <div key={i} style={{marginBottom:4}}>{line}</div>;
                  })}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginTop:10,fontSize:12,color:"var(--text-3)",fontWeight:600}}>
                  <span style={{color:"var(--text-2)"}}>{iWords.toLocaleString()} words</span>
                  <span style={{color:"var(--blue)",fontSize:15}}>→</span>
                  <span style={{color:"var(--blue)",fontWeight:700}}>{oWords.toLocaleString()} words</span>
                  <span style={{fontWeight:400}}>·</span>
                  <span style={{color:"var(--text-3)"}}>{language}</span>
                </div>
              </>}

              {status==="error" &&
                <div style={{flex:1,border:`1.5px solid ${theme==="dark"?"#7f1d1d":"#fecaca"}`,borderRadius:12,
                  padding:"24px 20px",minHeight:460,background:theme==="dark"?"#7f1d1d":"#fff8f8",
                  animation:"fadeUp .4s ease",display:"flex",flexDirection:"column",justifyContent:"center",gap:14}}>
                  <p style={{color:"#ef4444",fontWeight:700,fontSize:14}}>⚠ Error: {errMsg}</p>
                </div>}

              {/* Mobile summarize button */}
              <button className="mobile-sum-btn" onClick={handleSummarize} disabled={status==="loading"}
                style={{display:"none",marginTop:12,width:"100%",padding:"14px",
                  background:"linear-gradient(135deg,var(--blue),var(--blue-dark))",color:"white",
                  border:"none",borderRadius:12,fontFamily:"var(--font)",fontWeight:700,fontSize:15,cursor:"pointer"}}>
                {status==="loading"?"Generating…":"✨ Summarize"}
              </button>
            </div>
          </div>
        </div>

        {/* History panel */}
        {showHistory &&
          <div className="history-panel" style={{width:300,flexShrink:0,background:"var(--card)",
            border:"1.5px solid var(--border)",borderRadius:20,boxShadow:"var(--shadow)",
            display:"flex",flexDirection:"column",animation:"slideIn .25s ease",maxHeight:680,overflow:"hidden"}}>
            <div style={{padding:"16px 18px",borderBottom:"1.5px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <span style={{fontWeight:800,fontSize:14,color:"var(--text-1)"}}>History</span>
              <div style={{display:"flex",gap:8}}>
                {history.length>0 && <SmallBtn onClick={clearHistory} red><IcoTrash/> Clear</SmallBtn>}
                <SmallBtn onClick={()=>setShowHistory(false)}><IcoClear/></SmallBtn>
              </div>
            </div>
            <div style={{flex:1,overflowY:"auto",padding:"8px"}}>
              {history.length===0
                ? <div style={{padding:"40px 20px",textAlign:"center",color:"var(--text-3)",fontSize:13}}>
                    No history yet.<br/>Summaries appear here automatically.
                  </div>
                : history.map(h=>
                  <div key={h.id} className="history-item" onClick={()=>loadFromHistory(h)}
                    style={{padding:"12px 14px",borderRadius:10,cursor:"pointer",marginBottom:6,
                      border:"1.5px solid var(--border)",transition:"background .15s",position:"relative"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                      <span style={{fontSize:11,fontWeight:700,color:"var(--blue)",textTransform:"uppercase",letterSpacing:.6}}>
                        {h.language||"English"} · {h.length?.replace(/_/g," ")}
                      </span>
                      <button onClick={e=>{e.stopPropagation();deleteItem(h.id);}}
                        style={{background:"none",border:"none",cursor:"pointer",color:"var(--text-3)",padding:2}}>
                        <IcoTrash s={11}/>
                      </button>
                    </div>
                    <p style={{fontSize:12,color:"var(--text-2)",lineHeight:1.5,margin:"0 0 6px"}}>
                      {h.inputPreview}
                    </p>
                    <span style={{fontSize:11,color:"var(--text-3)"}}>{h.date} · {h.words} words</span>
                  </div>)}
            </div>
          </div>}
      </div>
    </div>
    </main>

    <Toast msg={toast.msg} show={toast.show}/>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
